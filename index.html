<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>💵 存钱小工具 - v15 成就版</title>
<meta name="theme-color" content="#1b5e20">
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 50%, #388e3c 100%); background-attachment: fixed; min-height: 100vh; color: #333; line-height: 1.6; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
.header { text-align: center; padding: 30px 20px; }
.header h1 { color: white; font-size: 2.2rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.2); }
.status-bar { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); padding: 12px 20px; border-radius: 50px; margin-bottom: 20px; color: white; font-size: 0.9rem; text-align: center; }
.user-bar { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; border-radius: 50px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; color: white; flex-wrap: wrap; gap: 10px; }
.user-avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #ffd700, #ffb300); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; }
.stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
.stat-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); padding: 25px; border-radius: 20px; text-align: center; color: white; }
.stat-value { font-size: 2rem; font-weight: 700; color: #ffd700; }
.glass-card { background: white; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
.btn { background: linear-gradient(135deg, #1b5e20, #4caf50); color: white; border: none; padding: 14px 28px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
.btn-gold { background: linear-gradient(135deg, #ffd700, #ffb300); color: #1b5e20; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(5px); justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
.modal.active { display: flex; }
.modal-content { background: white; border-radius: 20px; width: 100%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
.modal-content.wide { max-width: 600px; }
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #333; color: white; padding: 15px 25px; border-radius: 50px; font-size: 0.95rem; z-index: 2000; opacity: 0; transition: all 0.3s; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.version-tag { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.3); color: rgba(255,255,255,0.7); padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; }
.achievement-preview { background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,179,0,0.1)); border-radius: 16px; padding: 15px; margin: 15px 0; border: 2px dashed #ffd700; }
.achievement-badge-preview { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #ffd700, #ffb300); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; flex-shrink: 0; box-shadow: 0 4px 15px rgba(255,215,0,0.4); cursor: pointer; }
.achievements-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
.achievement-card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); position: relative; }
.achievement-card.unlocked { background: linear-gradient(135deg, #fffde7, #fff9c4); border: 2px solid #ffd700; }
.achievement-card.locked { opacity: 0.6; filter: grayscale(0.5); }
.achievement-celebration { text-align: center; padding: 30px; }
.achievement-celebration-icon { font-size: 5rem; margin-bottom: 15px; animation: bounce 1s infinite; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
.poster-container { background: linear-gradient(135deg, #fffde7, #fff9c4); border-radius: 20px; padding: 30px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <header class="header"><h1>💵 存钱小工具</h1><p>🏆 家庭储蓄里程碑成就系统</p></header>
  <div class="status-bar" id="statusBar">🔄 正在连接...</div>
  <div class="user-bar">
    <div class="user-info"><div class="user-avatar">👤</div><div>我是 <span id="displayName">我</span></div></div>
    <div><button class="btn" onclick="showModal('joinModal')" style="padding:10px 20px">👋 加入家庭计划</button></div>
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="statTotal">¥0</div><div class="stat-label">总存款</div></div>
    <div class="stat-card"><div class="stat-value" id="statCount">0</div><div class="stat-label">我的计划</div></div>
  </div>
  <div class="glass-card">
    <h3 style="margin-bottom:15px">🎯 新建计划</h3>
    <form id="createForm">
      <input type="text" id="gName" placeholder="计划名称" required style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <input type="number" id="gTarget" placeholder="目标金额" min="1" required style="padding:12px;border:1px solid #ddd;border-radius:8px;">
        <input type="number" id="gMonths" placeholder="时长(月)" min="1" required style="padding:12px;border:1px solid #ddd;border-radius:8px;">
      </div>
      <select id="gType" style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;">
        <option value="private">🔒 私人计划</option>
        <option value="family">👨‍👩‍👧‍👦 家庭计划</option>
      </select>
      <button type="submit" class="btn">✨ 创建</button>
    </form>
  </div>
  <div id="goalsList"></div>
</div>

<div class="modal" id="depositModal"><div class="modal-content"><div style="padding:20px;border-bottom:1px solid #eee"><strong>💰 存入金额</strong><button onclick="closeModal('depositModal')" style="float:right;border:none;background:none;font-size:1.5rem;cursor:pointer">&times;</button></div><div class="modal-body"><form id="depositForm"><input type="hidden" id="dGoalId"><input type="text" id="dGoalName" readonly style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;background:#f5f5f5;"><input type="number" id="dAmount" placeholder="存入金额" min="1" required style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;"><button type="submit" class="btn btn-gold" style="width:100%">💾 确认存入</button></form></div></div></div>
<div class="modal" id="achievementsModal"><div class="modal-content wide"><div style="padding:20px;border-bottom:1px solid #eee"><strong>🏆 家庭成就墙</strong><button onclick="closeModal('achievementsModal')" style="float:right;border:none;background:none;font-size:1.5rem;cursor:pointer">&times;</button></div><div class="modal-body" id="achievementsWallContent"></div></div></div>
<div class="modal" id="celebrationModal"><div class="modal-content"><div class="modal-body" id="celebrationContent"></div></div></div>
<div class="modal" id="posterModal"><div class="modal-content wide"><div style="padding:20px;border-bottom:1px solid #eee"><strong>🎨 荣誉海报</strong><button onclick="closeModal('posterModal')" style="float:right;border:none;background:none;font-size:1.5rem;cursor:pointer">&times;</button></div><div class="modal-body"><div id="posterContainer" class="poster-container"></div><div style="display:flex;gap:10px;margin-top:20px"><button class="btn" style="flex:1" onclick="downloadPoster()">💾 保存</button><button class="btn" style="flex:1;background:#666" onclick="closeModal('posterModal')">关闭</button></div></div></div></div>
<div class="modal" id="joinModal"><div class="modal-content"><div style="padding:20px;border-bottom:1px solid #eee"><strong>👋 加入家庭计划</strong><button onclick="closeModal('joinModal')" style="float:right;border:none;background:none;font-size:1.5rem;cursor:pointer">&times;</button></div><div class="modal-body"><form id="joinForm"><textarea id="joinCode" placeholder="粘贴分享码..." rows="4" style="width:100%;padding:12px;margin-bottom:10px;border:1px solid #ddd;border-radius:8px;resize:none;" required></textarea><button type="submit" class="btn" style="width:100%">🚀 立即加入</button></form></div></div></div>

<div class="toast" id="toast"></div>
<div class="version-tag">v15.0 成就版</div>

<script>
var db = null, currentUser = '我';
const STORAGE_KEY = "savings_v15_data";
const USER_KEY = "savings_v15_user";
const USER_ID_KEY = "savings_v15_userid";

var ACHIEVEMENT_DEFS = [
  { type: 'first_thousand', threshold: 1000, name: '第一桶金', desc: '总储蓄达¥1,000', icon: '🥉' },
  { type: 'five_thousand', threshold: 5000, name: '小有所成', desc: '总储蓄达¥5,000', icon: '🥈' },
  { type: 'ten_thousand', threshold: 10000, name: '万元户', desc: '总储蓄达¥10,000', icon: '🥇' },
  { type: 'twenty_thousand', threshold: 20000, name: '稳健前行', desc: '总储蓄达¥20,000', icon: '💎' },
  { type: 'fifty_thousand', threshold: 50000, name: '财富达人', desc: '总储蓄达¥50,000', icon: '👑' }
];

const firebaseConfig = {
  apiKey: "AIzaSyDZtyTKPzqzCmgCaPlCF9UoeLCOGs3okO4",
  authDomain: "savingmoney-6d898.firebaseapp.com",
  databaseURL: "https://savingmoney-6d898-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "savingmoney-6d898",
  appId: "1:364582624609:web:f6077a7012b59f44fe7920"
};
try { firebase.initializeApp(firebaseConfig); db = firebase.database(); } catch(e) {}

function showToast(msg) { var t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show"); setTimeout(function() { t.classList.remove("show"); }, 3000); }
function getUserId() { var id = localStorage.getItem(USER_ID_KEY); if (!id) { id = 'user_' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5); localStorage.setItem(USER_ID_KEY, id); } return id; }
function getUser() { return localStorage.getItem(USER_KEY) || "我"; }
function loadLocalData() { try { var d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : { goals: [], records: [], achievements: [] }; } catch(e) { return { goals: [], records: [], achievements: [] }; } }
function saveLocalData(data) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); return true; } catch(e) { return false; } }
function genId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 6); }
function fmtMoney(n) { return "¥" + parseFloat(n||0).toLocaleString("zh-CN"); }
function getSaved(goalId, records) { return records.filter(function(r) { return r.goalId === goalId; }).reduce(function(s, r) { return s + (parseFloat(r.amount)||0); }, 0); }
function escapeHtml(t) { return t ? t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;") : ""; }
function encodeShareCode(o) { return btoa(encodeURIComponent(JSON.stringify(o))); }
function decodeShareCode(c) { try { return JSON.parse(decodeURIComponent(atob(c))); } catch(e) { return null; } }
function showModal(id) { document.getElementById(id).classList.add("active"); }
function closeModal(id) { document.getElementById(id).classList.remove("active"); }

function checkAchievements(goalId, userId, userName) {
  var data = loadLocalData();
  var total = getSaved(goalId, data.records);
  var unlocked = [];
  ACHIEVEMENT_DEFS.forEach(function(def) {
    if (total >= def.threshold) {
      var exists = data.achievements.find(function(a) { return a.planId === goalId && a.type === def.type; });
      if (!exists) {
        var ach = { id: genId(), planId: goalId, type: def.type, name: def.name, desc: def.desc, icon: def.icon, unlockedAt: new Date().toISOString(), unlockedBy: userId, unlockedByName: userName };
        data.achievements.push(ach);
        unlocked.push(ach);
      }
    }
  });
  if (unlocked.length > 0) {
    saveLocalData(data);
    showToast("🏆 解锁成就：" + unlocked[0].name);
    showCelebration(unlocked[0]);
  }
  return unlocked;
}

function showCelebration(ach) {
  var html = '<div class="achievement-celebration"><div class="achievement-celebration-icon">' + ach.icon + '</div><div style="font-size:1.5rem;font-weight:700;color:#1b5e20;margin-bottom:10px;">🎉 成就解锁！</div><div style="font-size:1.2rem;color:#666;margin:10px 0">家庭达成【' + ach.name + '】</div><div style="background:#f5f5f5;padding:15px;border-radius:12px;margin:15px 0"><div style="font-size:1.3rem;font-weight:700;color:#1b5e20">' + ach.name + '</div><div style="color:#666">' + ach.desc + '</div></div><button class="btn" onclick="closeModal(\'celebrationModal\');render()">查看成就</button></div>';
  document.getElementById("celebrationContent").innerHTML = html;
  showModal("celebrationModal");
  setTimeout(function() { closeModal("celebrationModal"); }, 5000);
}

function renderAchievements(goalId) {
  var data = loadLocalData();
  var achs = data.achievements.filter(function(a) { return a.planId === goalId; });
  if (achs.length === 0) return '<div class="achievement-preview"><div style="text-align:center;color:#999;padding:20px;">🎉 存入第一笔，解锁家庭成就！</div></div>';
  var html = '<div class="achievement-preview"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><span style="font-weight:700;color:#1b5e20;">🏆 家庭成就 <span style="background:linear-gradient(135deg,#ffd700,#ffb300);color:#1b5e20;padding:2px 10px;border-radius:15px;font-size:0.85rem;">' + achs.length + '</span></span><span style="color:#1b5e20;cursor:pointer;" onclick="showAchievementsWall(\'' + goalId + '\')">查看全部 →</span></div><div style="display:flex;gap:10px;overflow-x:auto;">';
  achs.slice(0, 5).forEach(function(a) { html += '<div class="achievement-badge-preview" onclick="showAchievementsWall(\'' + goalId + '\')">' + a.icon + '</div>'; });
  html += '</div></div>';
  return html;
}

function showAchievementsWall(goalId) {
  var data = loadLocalData();
  var total = getSaved(goalId, data.records);
  var achs = data.achievements.filter(function(a) { return a.planId === goalId; });
  var html = '<div style="text-align:center;margin-bottom:20px;"><div style="font-size:1.2rem;font-weight:700;color:#1b5e20;">🏆 家庭成就墙</div><div style="color:#666;">当前储蓄：' + fmtMoney(total) + '</div></div>';
  html += '<div class="achievements-grid">';
  ACHIEVEMENT_DEFS.forEach(function(def) {
    var u = achs.find(function(a) { return a.type === def.type; });
    html += '<div class="achievement-card ' + (u ? 'unlocked' : 'locked') + '">';
    html += '<div style="width:60px;height:60px;border-radius:50%;background:' + (u ? 'linear-gradient(135deg,#ffd700,#ffb300)' : '#e0e0e0') + ';display:flex;align-items:center;justify-content:center;font-size:2rem;margin-bottom:10px;">' + def.icon + '</div>';
    html += '<div style="font-weight:700;">' + def.name + '</div>';
    html += '<div style="font-size:0.85rem;color:#666;margin-bottom:10px;">' + def.desc + '</div>';
    if (u) {
      html += '<div style="font-size:0.75rem;color:#999;">' + new Date(u.unlockedAt).toLocaleDateString('zh-CN') + ' 解锁</div>';
      html += '<button style="margin-top:10px;padding:8px 16px;background:#1b5e20;color:white;border:none;border-radius:20px;cursor:pointer;font-size:0.85rem;" onclick="showPoster(\'' + u.id + '\')">📤 分享海报</button>';
    } else { html += '<div style="position:absolute;top:15px;right:15px;font-size:1.2rem;color:#999;">🔒</div>'; }
    html += '</div>';
  });
  html += '</div>';
  document.getElementById("achievementsWallContent").innerHTML = html;
  showModal("achievementsModal");
}

function showPoster(achId) {
  var data = loadLocalData();
  var ach = data.achievements.find(function(a) { return a.id === achId; });
  if (!ach) return;
  var goal = data.goals.find(function(g) { return g.id === ach.planId; });
  var total = getSaved(ach.planId, data.records);
  var html = '<div style="font-size:4rem;margin-bottom:15px;">' + ach.icon + '</div><div style="font-size:1.8rem;font-weight:700;color:#1b5e20;margin-bottom:10px;">' + ach.name + '</div><div style="color:#666;margin-bottom:20px;">' + escapeHtml(goal.name) + '</div><div style="font-style:italic;color:#666;margin:20px 0;">"因为你们，家有了更大的意义"</div><div style="font-size:2rem;font-weight:700;color:#1b5e20;">' + fmtMoney(total) + '</div><div style="color:#666;font-size:0.9rem;">已累计储蓄</div>';
  document.getElementById("posterContainer").innerHTML = html;
  showModal("posterModal");
}

function downloadPoster() {
  if (typeof html2canvas !== 'undefined') {
    html2canvas(document.getElementById("posterContainer")).then(function(canvas) {
      var link = document.createElement('a');
      link.download = '存钱猪成就海报.png';
      link.href = canvas.toDataURL();
      link.click();
      showToast("✅ 海报已保存");
    });
  } else { showToast("❌ 请稍后重试"); }
}

function render() {
  var data = loadLocalData();
  currentUser = getUser();
  document.getElementById("displayName").textContent = currentUser;
  var goals = data.goals.filter(function(g) { return g.ownerId === getUserId() || g.owner === currentUser || (g.memberIds && g.memberIds.includes(getUserId())) || (g.members && g.members.includes(currentUser)); });
  document.getElementById("statTotal").textContent = fmtMoney(goals.reduce(function(s, g) { return s + getSaved(g.id, data.records); }, 0));
  document.getElementById("statCount").textContent = goals.length;
  var list = document.getElementById("goalsList");
  if (goals.length === 0) { list.innerHTML = '<div class="glass-card" style="text-align:center;padding:40px;color:#999;">还没有计划，创建一个吧！</div>'; return; }
  list.innerHTML = goals.map(function(g) {
    var saved = getSaved(g.id, data.records);
    var pct = Math.min(100, (saved / g.target * 100)).toFixed(1);
    var isFamily = g.type === 'family';
    var html = '<div class="glass-card" style="border-left:4px solid ' + (isFamily ? '#ff9800' : '#2196F3') + '">';
    html += '<div style="display:flex;justify-content:space-between;margin-bottom:10px;"><span style="font-weight:700;">' + escapeHtml(g.name) + '</span><span style="background:' + (isFamily ? '#fff3e0;color:#f57c00' : '#e3f2fd;color:#1976d2') + ';padding:4px 12px;border-radius:20px;font-size:0.8rem;">' + (isFamily ? '👨‍👩‍👧‍👦 家庭' : '🔒 私人') + '</span></div>';
    if (isFamily && g.members) { html += '<div style="display:flex;gap:5px;margin:10px 0;flex-wrap:wrap;">' + g.members.map(function(m) { return '<span style="padding:4px 12px;background:#f5f5f5;border-radius:20px;font-size:0.85rem;">' + (m === currentUser ? '👤 我' : escapeHtml(m)) + '</span>'; }).join('') + '</div>'; }
    html += '<div style="margin:15px 0;"><div style="display:flex;justify-content:space-between;margin-bottom:5px;font-size:0.9rem;"><span>进度 ' + pct + '%</span><span>' + (saved >= g.target ? '✅ 已完成' : '⏳ 进行中') + '</span></div><div style="height:12px;background:#e0e0e0;border-radius:10px;overflow:hidden;"><div style="height:100%;background:linear-gradient(90deg,#1b5e20,#4caf50,#ffd700);border-radius:10px;width:' + pct + '%;"></div></div></div>';
    html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:15px 0;padding:15px;background:white;border-radius:12px;font-size:0.85rem;text-align:center;"><div><div style="font-weight:700;">' + fmtMoney(g.target) + '</div><div style="color:#999;">目标</div></div><div><div style="font-weight:700;">' + fmtMoney(saved) + '</div><div style="color:#999;">已存</div></div><div><div style="font-weight:700;">' + fmtMoney(Math.max(0, g.target - saved)) + '</div><div style="color:#999;">剩余</div></div><div><div style="font-weight:700;">' + fmtMoney(g.monthly) + '</div><div style="color:#999;">每月</div></div></div>';
    if (isFamily) html += renderAchievements(g.id);
    html += '<div style="display:flex;gap:10px;margin-top:15px;"><button class="btn btn-gold" style="flex:1;" onclick="openDeposit(\'' + g.id + '\',\'' + escapeHtml(g.name) + '\')">💰 存入</button>' + (isFamily && g.owner === currentUser ? '<button class="btn" style="background:#ff9800;" onclick="openInvite(\'' + g.id + '\')">🔗 邀请</button>' : '') + '</div>';
    html += '</div>';
    return html;
  }).join('');
}

function openDeposit(gid, gname) { document.getElementById("dGoalId").value = gid; document.getElementById("dGoalName").value = gname; document.getElementById("dAmount").value = ""; showModal("depositModal"); }
function openInvite(gid) { var data = loadLocalData(); var goal = data.goals.find(function(g) { return g.id === gid; }); if (!goal) return; var share = { type: "savings_v4", version: 4, planId: goal.id, name: goal.name, target: goal.target, months: goal.months, monthly: goal.monthly, ownerId: goal.ownerId, owner: goal.owner }; document.getElementById("joinCode").value = encodeShareCode(share); showModal("joinModal"); }

document.addEventListener("DOMContentLoaded", function() {
  render();
  document.getElementById("createForm").addEventListener("submit", function(e) {
    e.preventDefault();
    var name = document.getElementById("gName").value.trim();
    var target = parseFloat(document.getElementById("gTarget").value);
    var months = parseInt(document.getElementById("gMonths").value);
    var type = document.getElementById("gType").value;
    var data = loadLocalData();
    data.goals.push({ id: genId(), name: name, target: target, months: months, monthly: (target/months).toFixed(2), type: type, ownerId: getUserId(), owner: currentUser, memberIds: [], members: type === 'family' ? [currentUser] : [], createdAt: new Date().toISOString() });
    saveLocalData(data);
    render();
    showToast(type === 'family' ? "✅ 家庭计划创建成功！" : "✅ 私人计划创建成功！");
    document.getElementById("createForm").reset();
  });
  document.getElementById("depositForm").addEventListener("submit", function(e) {
    e.preventDefault();
    var gid = document.getElementById("dGoalId").value;
    var amount = parseFloat(document.getElementById("dAmount").value);
    var data = loadLocalData();
    var goal = data.goals.find(function(g) { return g.id === gid; });
    data.records.push({ id: genId(), goalId: gid, amount: amount, who: currentUser, date: new Date().toISOString() });
    saveLocalData(data);
    if (goal && goal.type === 'family') checkAchievements(gid, getUserId(), currentUser);
    closeModal("depositModal");
    render();
    showToast("✅ 存入成功！");
  });
  document.getElementById("joinForm").addEventListener("submit", function(e) {
    e.preventDefault();
    var code = document.getElementById("joinCode").value.trim();
    var share = decodeShareCode(code);
    if (!share || share.type !== "savings_v4") { showToast("❌ 无效的分享码"); return; }
    var data = loadLocalData();
    if (data.goals.find(function(g) { return g.id === share.planId; })) { showToast("⚠️ 已在此计划中"); return; }
    data.goals.push({ id: share.planId, name: share.name, target: share.target, months: share.months, monthly: share.monthly, type: "family", ownerId: share.ownerId, owner: share.owner, memberIds: [getUserId()], members: [currentUser], joinedAt: new Date().toISOString() });
    saveLocalData(data);
    closeModal("joinModal");
    render();
    showToast("✅ 成功加入家庭计划！");
  });
});
</script>
</body>
</html>
